services:
  postgres:
    image: postgres:16
    container_name: adocao-postgres
    environment:
      POSTGRES_DB: adocao
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - adocao_pgdata:/var/lib/postgresql/data

volumes:
  adocao_pgdata:
