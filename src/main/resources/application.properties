spring.application.name=adocao-api

# Default (dev-friendly): in-memory database (no Postgres required)
# To use Postgres, override with env vars:
#   SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/adocao
#   SPRING_DATASOURCE_USERNAME=postgres
#   SPRING_DATASOURCE_PASSWORD=postgres
# Optionally (usually not needed), you can also set:
#   SPRING_DATASOURCE_DRIVER=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:adocao;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=true
