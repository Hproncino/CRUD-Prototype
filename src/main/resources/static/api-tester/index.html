<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>API Tester</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f17;
        --panel: #121a27;
        --text: #e6edf3;
        --muted: #9fb0c0;
        --border: rgba(255, 255, 255, 0.12);
        --accent: #5aa7ff;
        --ok: #2ecc71;
        --warn: #f39c12;
        --bad: #ff5c5c;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f8fa;
          --panel: #ffffff;
          --text: #111827;
          --muted: #4b5563;
          --border: rgba(17, 24, 39, 0.12);
          --accent: #2563eb;
        }
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        gap: 16px;
      }
      header {
        display: flex;
        gap: 12px;
        align-items: baseline;
        justify-content: space-between;
      }
      header h1 {
        font-size: 18px;
        margin: 0;
        letter-spacing: 0.2px;
      }
      header .hint {
        color: var(--muted);
        font-size: 13px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }
      .row {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
      }
      .row label {
        font-size: 12px;
        color: var(--muted);
      }
      input,
      select,
      textarea,
      button {
        font: inherit;
      }
      input,
      select,
      textarea {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 10px 12px;
        background: transparent;
        color: var(--text);
        outline: none;
      }
      textarea {
        min-height: 180px;
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.4;
        resize: vertical;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      button {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
      }
      button.primary {
        border-color: rgba(90, 167, 255, 0.45);
        background: rgba(90, 167, 255, 0.12);
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .pill {
        font-family: var(--mono);
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .pill.ok {
        color: var(--ok);
        border-color: rgba(46, 204, 113, 0.35);
      }
      .pill.bad {
        color: var(--bad);
        border-color: rgba(255, 92, 92, 0.35);
      }
      .pill.warn {
        color: var(--warn);
        border-color: rgba(243, 156, 18, 0.35);
      }
      .kv {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .mono {
        font-family: var(--mono);
        font-size: 12px;
      }
      pre {
        margin: 0;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.15);
        overflow: auto;
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.4;
      }
      .small {
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>API Tester</h1>
          <div class="hint">
            Feito pra testar endpoints do backend rapidamente (fetch).
          </div>
        </div>
        <div class="pill" id="statusPill">idle</div>
      </header>

      <div class="grid">
        <section class="card">
          <div class="row">
            <label for="baseUrl">Base URL</label>
            <input id="baseUrl" value="" placeholder="http://localhost:8080" />
          </div>
          <div class="row">
            <label for="method">Método</label>
            <select id="method">
              <option>GET</option>
              <option>POST</option>
              <option>PUT</option>
              <option>PATCH</option>
              <option>DELETE</option>
            </select>
          </div>
          <div class="row">
            <label for="path">Path</label>
            <input id="path" value="/api/ping" placeholder="/api/ping" />
          </div>
          <div class="row">
            <label for="headers">Headers (JSON)</label>
            <textarea
              id="headers"
              spellcheck="false"
              placeholder='{"Content-Type":"application/json"}'
            >{
  "Content-Type": "application/json"
}</textarea>
          </div>
          <div class="row">
            <label for="body">Body (JSON)</label>
            <textarea
              id="body"
              spellcheck="false"
              placeholder='{"name":"exemplo"}'
            >{}</textarea>
          </div>

          <div class="actions">
            <button class="primary" id="sendBtn">Enviar</button>
            <button id="pingBtn">Ping (/api/ping)</button>
            <button id="clearBtn">Limpar resposta</button>
          </div>

          <div class="small" style="margin-top: 10px">
            Dica: como este arquivo é servido pelo próprio backend, use base URL vazio
            ou <span class="mono">http://localhost:8080</span>.
          </div>
        </section>

        <section class="card">
          <div class="kv" style="margin-bottom: 10px">
            <div class="small">Resposta</div>
            <div class="actions" style="margin: 0">
              <span class="pill" id="httpPill">HTTP —</span>
              <span class="pill" id="timePill">— ms</span>
              <span class="pill" id="typePill">—</span>
            </div>
          </div>
          <pre id="out">{}</pre>
        </section>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const baseUrlEl = $("baseUrl");
      const methodEl = $("method");
      const pathEl = $("path");
      const headersEl = $("headers");
      const bodyEl = $("body");
      const outEl = $("out");
      const sendBtn = $("sendBtn");
      const pingBtn = $("pingBtn");
      const clearBtn = $("clearBtn");
      const statusPill = $("statusPill");
      const httpPill = $("httpPill");
      const timePill = $("timePill");
      const typePill = $("typePill");

      function setPill(el, text, kind) {
        el.textContent = text;
        el.classList.remove("ok", "bad", "warn");
        if (kind) el.classList.add(kind);
      }

      function safeJsonParse(text, fallback) {
        const t = (text ?? "").trim();
        if (!t) return fallback;
        return JSON.parse(t);
      }

      function pretty(value) {
        if (typeof value === "string") return value;
        try {
          return JSON.stringify(value, null, 2);
        } catch {
          return String(value);
        }
      }

      function joinUrl(base, path) {
        const b = (base ?? "").trim();
        const p = (path ?? "").trim();
        if (!b) return p || "/";
        if (!p) return b;
        const bb = b.endsWith("/") ? b.slice(0, -1) : b;
        const pp = p.startsWith("/") ? p : `/${p}`;
        return `${bb}${pp}`;
      }

      async function send() {
        sendBtn.disabled = true;
        pingBtn.disabled = true;
        setPill(statusPill, "loading", "warn");
        setPill(httpPill, "HTTP —");
        setPill(timePill, "— ms");
        setPill(typePill, "—");

        const started = performance.now();
        let url = "";
        try {
          const headers = safeJsonParse(headersEl.value, {});
          const method = methodEl.value;
          const path = pathEl.value;
          url = joinUrl(baseUrlEl.value, path);

          const hasBody = !["GET", "HEAD"].includes(method);
          const rawBody = (bodyEl.value ?? "").trim();
          const body =
            hasBody && rawBody && rawBody !== "{}" ? rawBody : hasBody ? rawBody : undefined;

          const res = await fetch(url, {
            method,
            headers,
            body: body,
          });

          const contentType = res.headers.get("content-type") || "";
          const elapsed = Math.round(performance.now() - started);
          const ok = res.ok;

          setPill(statusPill, ok ? "done" : "error", ok ? "ok" : "bad");
          setPill(httpPill, `HTTP ${res.status}`, ok ? "ok" : "bad");
          setPill(timePill, `${elapsed} ms`, "warn");
          setPill(typePill, contentType.split(";")[0] || "unknown", "warn");

          let payload;
          if (contentType.includes("application/json")) {
            payload = await res.json();
          } else {
            payload = await res.text();
          }

          outEl.textContent = pretty({
            request: { method, url },
            response: {
              status: res.status,
              ok: res.ok,
              headers: Object.fromEntries(res.headers.entries()),
              body: payload,
            },
          });
        } catch (e) {
          const elapsed = Math.round(performance.now() - started);
          setPill(statusPill, "failed", "bad");
          setPill(httpPill, "HTTP —", "bad");
          setPill(timePill, `${elapsed} ms`, "warn");
          setPill(typePill, "—", "warn");
          outEl.textContent = pretty({
            error: String(e?.message || e),
            url,
            hint:
              "Se você abrir este HTML via Live Server (porta 5500), pode dar CORS. Acesse pelo backend: http://localhost:8080/api-tester/",
          });
        } finally {
          sendBtn.disabled = false;
          pingBtn.disabled = false;
        }
      }

      function initBaseUrl() {
        const { origin } = window.location;
        if (origin && origin !== "null" && !origin.startsWith("file:")) {
          baseUrlEl.value = origin;
        } else {
          baseUrlEl.value = "http://localhost:8080";
        }
      }

      sendBtn.addEventListener("click", send);
      pingBtn.addEventListener("click", () => {
        methodEl.value = "GET";
        pathEl.value = "/api/ping";
        bodyEl.value = "{}";
        send();
      });
      clearBtn.addEventListener("click", () => {
        outEl.textContent = "{}";
        setPill(statusPill, "idle");
        setPill(httpPill, "HTTP —");
        setPill(timePill, "— ms");
        setPill(typePill, "—");
      });

      initBaseUrl();
    </script>
  </body>
</html>
